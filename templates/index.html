<!DOCTYPE html>
<html>
<head>
    <title>Spam Email Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<button onclick="darkMode()">🌙 Dark Mode</button>


<div class="container">

    <h1>📧 Spam Email Detection System</h1>

    <form action="/predict" method="POST">

        <textarea
            name="message"
            rows="10"
            placeholder="Enter Email or SMS Message..."
            required></textarea>

        <br><br>

        <button type="submit">🔍 Check Message</button>

    </form>

    <br>

    {% if prediction %}
    <h2>{{ prediction }}</h2>
    <p><b>confidence:</b> {{ probability }}%</p>
    <p><b>Risk Level:</b> {{risk}}</p>
    <p><b>keywords:</b> {{ keyword }}</p>


        <div class="result">
        </div>
        <h3>📊 Email Analysis</h3>

<div class="card">
    <p><strong>📝 Word Count:</strong> {{ words }}</p>
    <p><strong>🔠 Character Count:</strong> {{ characters }}</p>
</div>

    {% endif %}

    <br>

    <a href="/history">
        <button type="button">📜 View Prediction History</button>
    </a>

    <br><br>

    <a href="/dashboard">
        <button type="button">📊 Dashboard</button>
    </a>

</div>
<script>
function darkMode(){
    document.body.classList.toggle("dark");
}
</script>
</body>
</html>n
