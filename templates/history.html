<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>📜 Prediction History</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Message</th>
            <th>Prediction</th>
        </tr>

        {% for row in history %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>

    <a href="/">
        <button>🏠 Home</button>
    </a>

    <a href="/dashboard">
        <button>📊 Dashboard</button>
    </a>

</div>

</body>
</html>
